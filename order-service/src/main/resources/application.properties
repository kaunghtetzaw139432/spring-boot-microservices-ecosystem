spring.application.name=order-service
server.port=3000
spring.output.ansi.enabled=always

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${ORDER_DB_URL}
spring.datasource.username=${ORDER_DB_USER}
spring.datasource.password=${ORDER_DB_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# Kafka Config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=notificationTopic
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Type Mapping (notification-service ဘက်က mapping key နဲ့ တူရမယ်)
spring.kafka.producer.properties.spring.json.type.mapping=event:com.programmingtechie.order_service.event.OrderPlaceEvent
# order-service application.properties မှာ ထည့်ရန်
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Resilience4j Config 
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
resilience4j.circuitbreaker.instances.inventory.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventory.failureRateThreshold=50
resilience4j.retry.instances.inventory.maxAttempts=3

# Tracing
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]