spring.application.name=notification_service
server.port=8081
spring.output.ansi.enabled=always
# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL}
# Tracing
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]


# Kafka Config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification_group
spring.kafka.template.default-topic=notificationTopic
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=event:com.programmingtechie.order_service.event.OrderPlaceEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.programmingtechie.*


